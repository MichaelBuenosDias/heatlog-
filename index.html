<!DOCTYPE html>
<html lang="pl">
<head>
  <!-- Informacje o stronie — niewidoczne dla użytkownika -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeatLog — Serwis Wymienników Ciepła</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Górna belka nawigacyjna -->
  <header>
    <h1>🔧 HeatLog</h1>
    <p>System zarządzania serwisem wymienników ciepła</p>
  </header>

  <!-- Główna zawartość strony -->
  <main>

    <!-- Sekcja 1: Formularz dodawania nowego urządzenia -->
    <section id="sekcja-formularz">
      <h2>Dodaj urządzenie</h2>

      <form id="formularz-urzadzenia">

        <!-- Pole: nazwa urządzenia -->
        <div class="pole-formularza">
          <label for="nazwa">Nazwa urządzenia</label>
          <input
            type="text"
            id="nazwa"
            placeholder="np. Wymiennik płytowy Alfa Laval"
            required
          />
        </div>

        <!-- Pole: klient -->
        <div class="pole-formularza">
          <label for="klient">Klient</label>
          <input
            type="text"
            id="klient"
            placeholder="np. Jan Kowalski / Firma XYZ"
            required
          />
        </div>

        <!-- Pole: lokalizacja -->
        <div class="pole-formularza">
          <label for="lokalizacja">Lokalizacja</label>
          <input
            type="text"
            id="lokalizacja"
            placeholder="np. Warszawa, ul. Przemysłowa 5"
            required
          />
        </div>

        <!-- Pole: interwał przeglądu -->
        <div class="pole-formularza">
          <label for="interwal">Interwał przeglądu</label>
          <select id="interwal" required>
            <option value="6">Co 6 miesięcy</option>
            <option value="12" selected>Co 12 miesięcy</option>
          </select>
        </div>

        <button type="submit">+ Dodaj urządzenie</button>

      </form>
    </section>

    <!-- Sekcja 2: Lista dodanych urządzeń -->
    <section id="sekcja-lista">
      <h2>Lista urządzeń</h2>

      <!-- Pasek wyszukiwania i filtrów -->
      <div id="pasek-filtrow">

        <div class="pole-formularza">
          <label for="szukaj">Szukaj</label>
          <input
            type="text"
            id="szukaj"
            placeholder="Wpisz nazwę klienta lub lokalizację..."
          />
        </div>

        <div class="filtry-wiersz">

          <div class="pole-formularza">
            <label for="filtr-status">Status przeglądu</label>
            <select id="filtr-status">
              <option value="wszystkie">Wszystkie statusy</option>
              <option value="ok">✅ OK</option>
              <option value="wkrotce">⚠️ Wkrótce</option>
              <option value="przeterminowany">🔴 Przeterminowane</option>
            </select>
          </div>

          <div class="pole-formularza">
            <label for="sortuj">Sortuj według</label>
            <select id="sortuj">
              <option value="dataUtworzenia">Daty dodania (najnowsze)</option>
              <option value="nazwaRosnaco">Nazwy (A→Z)</option>
              <option value="terminPrzegladuRosnaco">Terminu przeglądu (najpilniejsze)</option>
            </select>
          </div>

        </div>
      </div>

      <!-- Tu JavaScript będzie wstawiał urządzenia -->
      <ul id="lista-urzadzen">
        <!-- Pusta na start — JS wypełni ją dynamicznie -->
      </ul>
    </section>

    <!-- Sekcja 3: Widok szczegółów urządzenia — domyślnie ukryty -->
    <!-- JS pokaże tę sekcję i schowa pozostałe gdy użytkownik kliknie "Szczegóły" -->
    <section id="sekcja-szczegoly" class="ukryty">

      <!-- Przycisk powrotu do listy -->
      <button id="btn-powrot" onclick="pokazWidokListy()">← Wróć do listy</button>

      <!-- Nagłówek z danymi urządzenia — JS wypełni dynamicznie -->
      <div id="szczegoly-naglowek"></div>

      <!-- Formularz dodawania wizyty serwisowej -->
      <div class="podsekcja">
        <h3>Dodaj wizytę serwisową</h3>

        <form id="formularz-wizyty">

          <div class="pole-formularza">
            <label for="wizyta-data">Data wizyty</label>
            <input type="date" id="wizyta-data" required />
          </div>

          <div class="pole-formularza">
            <label for="wizyta-usterka">Opis usterki / zgłoszenia</label>
            <textarea id="wizyta-usterka" rows="3" placeholder="np. Brak ciepłej wody, wymiennik zaszlamiony" required></textarea>
          </div>

          <div class="pole-formularza">
            <label for="wizyta-czynnosci">Wykonane czynności</label>
            <textarea id="wizyta-czynnosci" rows="3" placeholder="np. Chemiczne czyszczenie płyt, wymiana uszczelek" required></textarea>
          </div>

          <div class="pole-formularza">
            <label for="wizyta-czesci">Użyte części (opcjonalnie)</label>
            <input type="text" id="wizyta-czesci" placeholder="np. Uszczelka Alfa Laval M6-FG x4" />
          </div>

          <button type="submit">+ Dodaj wizytę</button>

        </form>
      </div>

      <!-- Historia wizyt — JS wypełni dynamicznie -->
      <div class="podsekcja">
        <h3>Historia wizyt</h3>
        <ul id="lista-wizyt"></ul>
      </div>

      <!-- Przycisk drukowania — widoczny tylko w widoku szczegółów -->
      <button id="btn-drukuj" onclick="drukujRaport()">🖨️ Drukuj raport</button>

    </section>

    <!-- Sekcja 4: Raport do druku — niewidoczna na ekranie, pojawia się tylko przy druku -->
    <section id="sekcja-raport">
      <!-- JS wypełni tę sekcję danymi przed drukowaniem -->
    </section>

  </main>

  <!-- Skrypt JS ładujemy na końcu — żeby HTML zdążył się wczytać przed kodem -->
  <script src="app.js"></script>

</body>
</html>
